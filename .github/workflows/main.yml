name: Social Media Auto-Upload

on:
  schedule:
    # All times UTC.  IST = UTC+5:30
    # 8:00 PM IST  = 14:30 UTC
    # 10:00 PM IST = 16:30 UTC
    # 12:00 AM IST = 18:30 UTC
    # 1:00 AM IST  = 19:30 UTC
    - cron: "30 14 * * *"
    - cron: "30 16 * * *"
    - cron: "30 18 * * *"
    - cron: "30 19 * * *"

  # Manual trigger from the GitHub UI (Actions → Run workflow)
  workflow_dispatch:
    inputs:
      loop_override:
        description: "Number of accounts to process (overrides LOOP secret)"
        required: false
        default: ""

jobs:
  upload:
    name: Pick & Upload Video
    runs-on: ubuntu-latest
    timeout-minutes: 60   # generous limit for large videos + Instagram polling

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # requirements.txt is intentionally empty (stdlib only),
      # but we run pip install anyway so future additions just work.
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run upload pipeline
        env:
          # ── How many account slots to process ────────────────
          # Set secret LOOP to "2" for 2 accounts, "3" for 3, etc.
          # workflow_dispatch input takes priority when provided.
          LOOP: ${{ github.event.inputs.loop_override || secrets.LOOP }}

          # ── Shared Google Drive OAuth (one app, all accounts) ─
          GDRIVE_CLIENT_ID:      ${{ secrets.GDRIVE_CLIENT_ID }}
          GDRIVE_CLIENT_SECRET:  ${{ secrets.GDRIVE_CLIENT_SECRET }}
          GDRIVE_REFRESH_TOKEN:  ${{ secrets.GDRIVE_REFRESH_TOKEN }}

          # ── Account 1 ─────────────────────────────────────────
          GDRIVE_VIDEOS_FOLDER_ID_1:   ${{ secrets.GDRIVE_VIDEOS_FOLDER_ID_1 }}
          GDRIVE_METADATA_FOLDER_ID_1: ${{ secrets.GDRIVE_METADATA_FOLDER_ID_1 }}
          GDRIVE_LOGS_FOLDER_ID_1:     ${{ secrets.GDRIVE_LOGS_FOLDER_ID_1 }}
          YT_CLIENT_ID_1:              ${{ secrets.YT_CLIENT_ID_1 }}
          YT_CLIENT_SECRET_1:          ${{ secrets.YT_CLIENT_SECRET_1 }}
          YT_REFRESH_TOKEN_1:          ${{ secrets.YT_REFRESH_TOKEN_1 }}
          IG_ACCESS_TOKEN_1:           ${{ secrets.IG_ACCESS_TOKEN_1 }}
          IG_ACCOUNT_ID_1:             ${{ secrets.IG_ACCOUNT_ID_1 }}

          # ── Account 2 (add secrets, set LOOP=2 to activate) ───
          GDRIVE_VIDEOS_FOLDER_ID_2:   ${{ secrets.GDRIVE_VIDEOS_FOLDER_ID_2 }}
          GDRIVE_METADATA_FOLDER_ID_2: ${{ secrets.GDRIVE_METADATA_FOLDER_ID_2 }}
          GDRIVE_LOGS_FOLDER_ID_2:     ${{ secrets.GDRIVE_LOGS_FOLDER_ID_2 }}
          YT_CLIENT_ID_2:              ${{ secrets.YT_CLIENT_ID_2 }}
          YT_CLIENT_SECRET_2:          ${{ secrets.YT_CLIENT_SECRET_2 }}
          YT_REFRESH_TOKEN_2:          ${{ secrets.YT_REFRESH_TOKEN_2 }}
          IG_ACCESS_TOKEN_2:           ${{ secrets.IG_ACCESS_TOKEN_2 }}
          IG_ACCOUNT_ID_2:             ${{ secrets.IG_ACCOUNT_ID_2 }}

          # ── Account 3 (add secrets, set LOOP=3 to activate) ───
          GDRIVE_VIDEOS_FOLDER_ID_3:   ${{ secrets.GDRIVE_VIDEOS_FOLDER_ID_3 }}
          GDRIVE_METADATA_FOLDER_ID_3: ${{ secrets.GDRIVE_METADATA_FOLDER_ID_3 }}
          GDRIVE_LOGS_FOLDER_ID_3:     ${{ secrets.GDRIVE_LOGS_FOLDER_ID_3 }}
          YT_CLIENT_ID_3:              ${{ secrets.YT_CLIENT_ID_3 }}
          YT_CLIENT_SECRET_3:          ${{ secrets.YT_CLIENT_SECRET_3 }}
          YT_REFRESH_TOKEN_3:          ${{ secrets.YT_REFRESH_TOKEN_3 }}
          IG_ACCESS_TOKEN_3:           ${{ secrets.IG_ACCESS_TOKEN_3 }}
          IG_ACCOUNT_ID_3:             ${{ secrets.IG_ACCOUNT_ID_3 }}

          # To add Account 4+: copy the Account 3 block, increment suffix,
          # add matching secrets in GitHub, and bump LOOP.

        run: python upload_pipeline.py

      # Always save local logs as a GitHub Actions artifact (backup)
      - name: Save logs as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-logs-${{ github.run_id }}
          path: /tmp/acct*.txt
          if-no-files-found: ignore
          retention-days: 30
